site_name: Yet Another Home Lab Journey | And Other Projcets
site_url: https://www.dustinfunkhouser.com/
repo_url: https://github.com/EncryptedFunk/EncryptedFunk.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Cyberpunk Dark Mode (Primary)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black        # Deep background
      accent: cyan         # Neon blue accents for links/hover
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # High-Contrast Light Mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections      # Sidebar sections
    - navigation.expand        # Keep sidebar expanded
    - navigation.path                 # Highlight current page
    - content.code.copy        # Copy buttons for code blocks
    - content.code.annotate    # Explanatory annotations in code
    - content.action.edit            # "Edit on GitHub" links
    - content.code.copy
edit_uri: edit/main/docs/  # Base URI for "Edit on GitHub" links

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js
  - javascripts/mermaid-config.js

markdown_extensions:
  - admonition                 # Tips, Warnings, Notes boxes
  - tables                     # For structured data presentation
  - codehilite                 # Syntax highlighting for code blocks
  - pymdownx.details           # Collapsible blocks
  - pymdownx.betterem:
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.superfences # Required for Mermaid and complex nesting
  - pymdownx.progressbar # Fixes Section 5 (System Sync Bars)
  - pymdownx.superfences:      # Required for Mermaid Diagrams
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true    # Tabs for Plan vs. Result
  - pymdownx.tasklist:
      custom_checkbox: true    # Planning checklists
  - tables                     # Hardware resource tables

nav:
  - Home: index.md
  - Infrastructure:
      - Hardware & Proxmox: infrastructure/hardware.md
      - Networking: infrastructure/networking.md
      - Rocky Swarm Nodes: infrastructure/swarm-nodes.md
  - Stacks:
    - Infisical: stacks/infisical.md
    - n8n: stacks/n8n.md
    - Adguard: stacks/adguard.md
  - Planning & Journey:
      - The Roadmap: journey/roadmap.md
      - Technical Hurdles: journey/hurdles.md
      - Resources & References: journey/resources.md
      - Notes and Testing: journey/notes.md

plugins:
  - search